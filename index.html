<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>車の予約・オドメーター・経費管理</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#fff;
      --line:#d9e0e7;
      --text:#1f2937;
      --sub:#6b7280;
      --accent:#111827;
      --soft:#eef2f7;
      --danger:#b91c1c;
      --danger-bg:#fef2f2;
      --notice:#1d4ed8;
      --notice-bg:#eff6ff;
      --notice-line:#bfdbfe;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1280px;margin:0 auto;padding:20px}
    .header,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .header{padding:24px;display:grid;gap:16px}
    .title-wrap small{color:var(--sub);display:block;margin-bottom:6px}
    h1,h2,h3,p{margin:0}
    .muted{color:var(--sub)}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .stat{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
    .stat-label{font-size:12px;color:var(--sub);margin-bottom:6px}
    .stat-value{font-size:24px;font-weight:700}
    .notice,.error{margin-top:16px;padding:12px 14px;border-radius:16px;display:none}
    .notice{border:1px solid var(--notice-line);background:var(--notice-bg);color:var(--notice)}
    .error{border:1px solid #fecaca;background:var(--danger-bg);color:var(--danger)}
    .layout{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;margin-top:20px}
    .card{padding:18px}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .month-nav{display:flex;align-items:center;gap:8px}
    button{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;padding:10px 14px;cursor:pointer;font-size:14px}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    button:disabled{opacity:.6;cursor:not-allowed}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .tab-button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    .grid-7{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .week{text-align:center;font-size:12px;color:var(--sub);padding:6px 0;font-weight:600}
    .day{min-height:110px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:8px}
    .day.blank{background:var(--soft)}
    .day.today{border-color:var(--accent);background:#f8fafc}
    .day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;font-weight:700}
    .badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;background:#fff}
    .mini-item{background:var(--soft);border-radius:12px;padding:6px;font-size:11px;margin-bottom:6px}
    .section-title{font-size:20px;font-weight:700;margin-bottom:14px}
    .form-grid{display:grid;gap:14px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;background:#fff}
    textarea{min-height:84px;resize:vertical}
    .toolbar{display:grid;grid-template-columns:1fr 180px;gap:10px;margin-bottom:14px}
    .list-wrap{display:grid;gap:14px}
    .item-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px}
    .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    .item-title{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
    .meta{color:var(--sub);font-size:14px;display:flex;flex-wrap:wrap;gap:12px}
    .subcard{margin-top:12px;background:var(--soft);border-radius:16px;padding:14px}
    .summary-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:20px}
    .empty{text-align:center;color:var(--sub);padding:24px 12px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
    @media (max-width:720px){.stats,.tabs,.grid-2,.summary-row,.toolbar{grid-template-columns:1fr}.container{padding:14px}.day{min-height:90px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-wrap">
        <small>たくま・ぴ・二人 用</small>
        <h1>車の予約・オドメーター・経費管理</h1>
        <p class="muted" style="margin-top:8px;">GitHub Pages + Supabase 版</p>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">予約件数</div><div class="stat-value" id="statReservations">0</div></div>
        <div class="stat"><div class="stat-label">走行距離</div><div class="stat-value" id="statDistance">0km</div></div>
        <div class="stat"><div class="stat-label">給油合計</div><div class="stat-value" id="statFuel">¥0</div></div>
        <div class="stat"><div class="stat-label">経費合計</div><div class="stat-value" id="statExpense">¥0</div></div>
      </div>
    </div>

    <div class="notice" id="noticeBox"></div>
    <div class="error" id="errorBox"></div>

    <div class="layout">
      <div class="card">
        <div class="calendar-head">
          <h2 class="section-title">予約カレンダー</h2>
          <div class="month-nav">
            <button id="prevMonth">←</button>
            <div id="monthLabel" style="min-width:110px;text-align:center;font-weight:700;"></div>
            <button id="nextMonth">→</button>
          </div>
        </div>
        <div class="grid-7" id="weekRow"></div>
        <div class="grid-7" id="calendarGrid"></div>
      </div>

      <div>
        <div class="tabs">
          <button class="tab-button active" data-tab="reserve">予約</button>
          <button class="tab-button" data-tab="list">一覧</button>
          <button class="tab-button" data-tab="fuel">給油</button>
          <button class="tab-button" data-tab="expense">経費</button>
        </div>

        <div class="tab-pane active" id="tab-reserve">
          <div class="card">
            <h2 class="section-title">新しい予約を追加</h2>
            <div class="form-grid">
              <div>
                <label for="reserveUser">使用者</label>
                <select id="reserveUser">
                  <option>たくま</option>
                  <option>ぴ</option>
                  <option>二人</option>
                </select>
              </div>
              <div>
                <label for="reserveDate">日付</label>
                <input id="reserveDate" type="date" />
              </div>
              <div class="grid-2">
                <div>
                  <label for="reserveStart">開始時間</label>
                  <input id="reserveStart" type="time" />
                </div>
                <div>
                  <label for="reserveEnd">終了時間</label>
                  <input id="reserveEnd" type="time" />
                </div>
              </div>
              <div>
                <label for="reserveDestination">目的地・用件</label>
                <input id="reserveDestination" type="text" placeholder="例：買い物、通院、送迎" />
              </div>
              <div>
                <label for="reserveNote">メモ</label>
                <textarea id="reserveNote"></textarea>
              </div>
              <button class="primary" id="addReservationBtn">予約を追加</button>
            </div>
          </div>
        </div>

        <div class="tab-pane" id="tab-list">
          <div class="card">
            <div class="toolbar">
              <input id="searchText" type="text" placeholder="目的地・メモ・日付で検索" />
              <select id="userFilter">
                <option>全員</option>
                <option>たくま</option>
                <option>ぴ</option>
                <option>二人</option>
              </select>
            </div>
            <div class="list-wrap" id="reservationList"></div>
          </div>
        </div>

        <div class="tab-pane" id="tab-fuel">
          <div class="card" style="margin-bottom:14px;">
            <h2 class="section-title">給油記録を追加</h2>
            <div class="form-grid">
              <div class="grid-2">
                <div>
                  <label for="fuelDate">日付</label>
                  <input id="fuelDate" type="date" />
                </div>
                <div>
                  <label for="fuelUser">使用者</label>
                  <select id="fuelUser">
                    <option>たくま</option>
                    <option>ぴ</option>
                    <option>二人</option>
                  </select>
                </div>
              </div>
              <div class="grid-2">
                <div>
                  <label for="fuelAmount">金額（円）</label>
                  <input id="fuelAmount" type="number" />
                </div>
                <div>
                  <label for="fuelOdometer">オドメーター</label>
                  <input id="fuelOdometer" type="number" />
                </div>
              </div>
              <div>
                <label for="fuelNote">メモ</label>
                <textarea id="fuelNote"></textarea>
              </div>
              <button class="primary" id="addFuelBtn">給油記録を追加</button>
            </div>
          </div>
          <div class="card">
            <h2 class="section-title">給油履歴</h2>
            <div class="list-wrap" id="fuelList"></div>
          </div>
        </div>

        <div class="tab-pane" id="tab-expense">
          <div class="card" style="margin-bottom:14px;">
            <h2 class="section-title">その他経費を追加</h2>
            <div class="form-grid">
              <div class="grid-2">
                <div>
                  <label for="expenseDate">日付</label>
                  <input id="expenseDate" type="date" />
                </div>
                <div>
                  <label for="expenseUser">使用者</label>
                  <select id="expenseUser">
                    <option>たくま</option>
                    <option>ぴ</option>
                    <option>二人</option>
                  </select>
                </div>
              </div>
              <div class="grid-2">
                <div>
                  <label for="expenseCategory">項目</label>
                  <input id="expenseCategory" type="text" placeholder="例：駐車場、高速代、洗車" />
                </div>
                <div>
                  <label for="expenseAmount">金額（円）</label>
                  <input id="expenseAmount" type="number" />
                </div>
              </div>
              <div>
                <label for="expenseNote">メモ</label>
                <textarea id="expenseNote"></textarea>
              </div>
              <button class="primary" id="addExpenseBtn">経費を追加</button>
            </div>
          </div>
          <div class="card">
            <h2 class="section-title">その他経費履歴</h2>
            <div class="list-wrap" id="expenseList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="summary-row">
      <div class="card">
        <div class="stat-label">最新オドメーター</div>
        <div class="stat-value" id="latestOdometer">未記録</div>
      </div>
      <div class="card">
        <div class="stat-label">次の予約</div>
        <div style="font-size:20px;font-weight:700;" id="nextReservation">なし</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://tpbjruhcrxdyswzxxrec.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_E6fl5jLPtd41TC0BUadSog_UwCsIoyZ";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const WEEK_LABELS = ["日","月","火","水","木","金","土"];
    let currentMonth = new Date();
    let state = { reservations: [], fuelLogs: [], expenseLogs: [] };

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.style.display = message ? "block" : "none";
      box.textContent = message || "";
    }

    function showNotice(message) {
      const box = document.getElementById("noticeBox");
      box.style.display = message ? "block" : "none";
      box.textContent = message || "";
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T00:00:00");
      if (Number.isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "short",
        day: "numeric",
        weekday: "short"
      });
    }

    function formatMonth(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function toMinutes(t) {
      if (!t || !t.includes(":")) return null;
      const [h, m] = t.split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return null;
      return h * 60 + m;
    }

    function overlaps(a, b) {
      if (a.date !== b.date) return false;
      const aS = toMinutes(a.start_time || a.startTime);
      const aE = toMinutes(a.end_time || a.endTime);
      const bS = toMinutes(b.start_time || b.startTime);
      const bE = toMinutes(b.end_time || b.endTime);
      if ([aS, aE, bS, bE].some(v => v === null)) return false;
      return aS < bE && bS < aE;
    }

    function sortedReservations() {
      return [...state.reservations].sort((a, b) =>
        `${a.date} ${a.start_time}`.localeCompare(`${b.date} ${b.start_time}`)
      );
    }

    function filteredReservations() {
      const keyword = document.getElementById("searchText").value.trim().toLowerCase();
      const user = document.getElementById("userFilter").value;
      return sortedReservations().filter(r => {
        const matchesUser = user === "全員" || r.user_name === user;
        const matchesText = !keyword || [r.destination, r.note, r.date, r.start_time, r.end_time, r.user_name]
          .join(" ")
          .toLowerCase()
          .includes(keyword);
        return matchesUser && matchesText;
      });
    }

    async function syncFromSupabase() {
      try {
        showError("");
        showNotice("Supabase から読み込み中...");

        const [{ data: reservations, error: rErr }, { data: fuelLogs, error: fErr }, { data: expenseLogs, error: eErr }] =
          await Promise.all([
            supabase.from("reservations").select("*"),
            supabase.from("fuel_logs").select("*"),
            supabase.from("expense_logs").select("*")
          ]);

        if (rErr) throw rErr;
        if (fErr) throw fErr;
        if (eErr) throw eErr;

        state = {
          reservations: reservations || [],
          fuelLogs: fuelLogs || [],
          expenseLogs: expenseLogs || []
        };

        showNotice("");
        renderAll();
      } catch (e) {
        showNotice("");
        showError(e.message || "読み込みに失敗しました");
      }
    }

    function calcDistance(r) {
      const start = Number(r.odometer_start);
      const end = Number(r.odometer_end);
      if (Number.isNaN(start) || Number.isNaN(end)) return null;
      return Math.max(0, end - start);
    }

    function renderStats() {
      const reservations = filteredReservations();
      const totalDistance = reservations.reduce((sum, r) => sum + (calcDistance(r) || 0), 0);
      const fuel = state.fuelLogs.reduce((sum, x) => sum + (Number(x.amount) || 0), 0);
      const expense = state.expenseLogs.reduce((sum, x) => sum + (Number(x.amount) || 0), 0);

      document.getElementById("statReservations").textContent = reservations.length;
      document.getElementById("statDistance").textContent = `${totalDistance}km`;
      document.getElementById("statFuel").textContent = `¥${fuel.toLocaleString()}`;
      document.getElementById("statExpense").textContent = `¥${expense.toLocaleString()}`;

      const latest = [...sortedReservations()].reverse().find(r => r.odometer_end && !Number.isNaN(Number(r.odometer_end)));
      document.getElementById("latestOdometer").textContent = latest ? `${latest.odometer_end}km` : "未記録";

      const today = new Date().toISOString().slice(0, 10);
      const next = sortedReservations().find(r => `${r.date} ${r.start_time}` >= `${today} 00:00`);
      document.getElementById("nextReservation").textContent = next
        ? `${formatDate(next.date)} ${next.start_time} ${next.user_name}`
        : "なし";
    }

    function buildCalendarDays(date) {
      const year = date.getFullYear();
      const month = date.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const days = [];
      for (let i = 0; i < first.getDay(); i++) days.push(null);
      for (let d = 1; d <= last.getDate(); d++) days.push(new Date(year, month, d));
      while (days.length % 7 !== 0) days.push(null);
      return days;
    }

    function renderCalendar() {
      document.getElementById("monthLabel").textContent = formatMonth(currentMonth);
      document.getElementById("weekRow").innerHTML = WEEK_LABELS.map(label => `<div class="week">${label}</div>`).join("");

      const map = {};
      state.reservations.forEach(r => {
        if (!map[r.date]) map[r.date] = [];
        map[r.date].push(r);
      });

      const today = new Date().toISOString().slice(0, 10);
      const days = buildCalendarDays(currentMonth);

      document.getElementById("calendarGrid").innerHTML = days.map(day => {
        if (!day) return `<div class="day blank"></div>`;
        const dateKey = day.toISOString().slice(0, 10);
        const items = (map[dateKey] || []).sort((a, b) => a.start_time.localeCompare(b.start_time));
        return `
          <div class="day ${dateKey === today ? "today" : ""}">
            <div class="day-top">
              <span>${day.getDate()}</span>
              ${items.length ? `<span class="badge">${items.length}件</span>` : ""}
            </div>
            ${items.slice(0, 3).map(item => `
              <div class="mini-item">
                <div style="font-weight:700;">${item.start_time} ${item.user_name}</div>
                <div class="muted" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.destination}</div>
              </div>
            `).join("")}
            ${items.length > 3 ? `<div class="muted" style="font-size:11px;">ほか ${items.length - 3} 件</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderReservationList() {
      const rows = filteredReservations();
      const el = document.getElementById("reservationList");

      if (!rows.length) {
        el.innerHTML = `<div class="empty">条件に合う予約はありません。</div>`;
        return;
      }

      el.innerHTML = rows.map(r => {
        const distance = calcDistance(r);
        return `
          <div class="item-card">
            <div class="item-top">
              <div>
                <div class="item-title">
                  <span class="badge">${r.user_name}</span>
                  <strong style="font-size:18px;">${r.destination}</strong>
                </div>
                <div class="meta">
                  <span>${formatDate(r.date)}</span>
                  <span>${r.start_time} 〜 ${r.end_time}</span>
                </div>
                ${r.note ? `<div class="muted" style="margin-top:8px;">メモ：${r.note}</div>` : ""}
              </div>
              <button onclick="deleteReservation('${r.id}')">削除</button>
            </div>
            <div class="subcard">
              <div style="font-weight:700;margin-bottom:10px;">オドメーター記録</div>
              <div class="grid-2">
                <div>
                  <label>利用前</label>
                  <input type="number" id="odoStart-${r.id}" value="${r.odometer_start || ""}" />
                </div>
                <div>
                  <label>利用後</label>
                  <input type="number" id="odoEnd-${r.id}" value="${r.odometer_end || ""}" />
                </div>
              </div>
              <div style="margin-top:10px;" class="muted">走行距離：${distance !== null ? `${distance} km` : "未記録"}</div>
              <button class="primary" style="margin-top:12px;" onclick="saveOdometer('${r.id}')">保存</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderFuelList() {
      const el = document.getElementById("fuelList");
      const rows = [...state.fuelLogs].reverse();

      if (!rows.length) {
        el.innerHTML = `<div class="empty">給油記録はまだありません。</div>`;
        return;
      }

      el.innerHTML = rows.map(item => `
        <div class="item-card">
          <div class="item-top">
            <div>
              <div class="item-title">
                <span class="badge">${item.user_name}</span>
                <strong>${formatDate(item.date)}</strong>
              </div>
              <div>¥${Number(item.amount || 0).toLocaleString()} / ${item.odometer ? `${item.odometer}km` : "オドメーター未記録"}</div>
              ${item.note ? `<div class="muted" style="margin-top:6px;">${item.note}</div>` : ""}
            </div>
            <button onclick="deleteFuel('${item.id}')">削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderExpenseList() {
      const el = document.getElementById("expenseList");
      const rows = [...state.expenseLogs].reverse();

      if (!rows.length) {
        el.innerHTML = `<div class="empty">経費記録はまだありません。</div>`;
        return;
      }

      el.innerHTML = rows.map(item => `
        <div class="item-card">
          <div class="item-top">
            <div>
              <div class="item-title">
                <span class="badge">${item.user_name}</span>
                <strong>${item.category}</strong>
              </div>
              <div>${formatDate(item.date)} / ¥${Number(item.amount || 0).toLocaleString()}</div>
              ${item.note ? `<div class="muted" style="margin-top:6px;">${item.note}</div>` : ""}
            </div>
            <button onclick="deleteExpense('${item.id}')">削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      renderStats();
      renderCalendar();
      renderReservationList();
      renderFuelList();
      renderExpenseList();
    }

    async function deleteReservation(id) {
      const { error } = await supabase.from("reservations").delete().eq("id", id);
      if (error) {
        showError(error.message || "削除に失敗しました");
        return;
      }
      await syncFromSupabase();
      showNotice("予約を削除しました");
    }

    async function deleteFuel(id) {
      const { error } = await supabase.from("fuel_logs").delete().eq("id", id);
      if (error) {
        showError(error.message || "削除に失敗しました");
        return;
      }
      await syncFromSupabase();
      showNotice("給油記録を削除しました");
    }

    async function deleteExpense(id) {
      const { error } = await supabase.from("expense_logs").delete().eq("id", id);
      if (error) {
        showError(error.message || "削除に失敗しました");
        return;
      }
      await syncFromSupabase();
      showNotice("経費記録を削除しました");
    }

    async function saveOdometer(id) {
      showError("");
      const odometer_start = document.getElementById(`odoStart-${id}`).value;
      const odometer_end = document.getElementById(`odoEnd-${id}`).value;

      const start = Number(odometer_start);
      const end = Number(odometer_end);

      if (Number.isNaN(start) || Number.isNaN(end)) {
        showError("オドメーターは数字で入力してください。");
        return;
      }
      if (end < start) {
        showError("利用後オドメーターは利用前以上にしてください。");
        return;
      }

      const { error } = await supabase
        .from("reservations")
        .update({ odometer_start, odometer_end })
        .eq("id", id);

      if (error) {
        showError(error.message || "保存に失敗しました");
        return;
      }

      await syncFromSupabase();
      showNotice("オドメーターを保存しました");
    }

    function setupTabs() {
      document.querySelectorAll(".tab-button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-button").forEach(x => x.classList.remove("active"));
          document.querySelectorAll(".tab-pane").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
        });
      });
    }

    function setupEvents() {
      document.getElementById("prevMonth").addEventListener("click", () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
        renderCalendar();
      });

      document.getElementById("nextMonth").addEventListener("click", () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        renderCalendar();
      });

      document.getElementById("searchText").addEventListener("input", renderAll);
      document.getElementById("userFilter").addEventListener("change", renderAll);

      document.getElementById("addReservationBtn").addEventListener("click", async () => {
        showError("");
        const user_name = document.getElementById("reserveUser").value;
        const date = document.getElementById("reserveDate").value;
        const start_time = document.getElementById("reserveStart").value;
        const end_time = document.getElementById("reserveEnd").value;
        const destination = document.getElementById("reserveDestination").value.trim();
        const note = document.getElementById("reserveNote").value.trim();

        if (!date || !start_time || !end_time || !destination) {
          showError("日付・時間・目的地は必須です。");
          return;
        }
        if ((toMinutes(start_time) ?? 0) >= (toMinutes(end_time) ?? 0)) {
          showError("終了時間は開始時間より後にしてください。");
          return;
        }

        const newItem = {
          id: String(Date.now()),
          user_name,
          date,
          start_time,
          end_time,
          destination,
          note,
          odometer_start: "",
          odometer_end: ""
        };

        if (state.reservations.some(r => overlaps(r, newItem))) {
          showError("その時間帯にはすでに予約があります。");
          return;
        }

        const { error } = await supabase.from("reservations").insert([newItem]);
        if (error) {
          showError(error.message || "予約追加に失敗しました");
          return;
        }

        document.getElementById("reserveDate").value = "";
        document.getElementById("reserveStart").value = "";
        document.getElementById("reserveEnd").value = "";
        document.getElementById("reserveDestination").value = "";
        document.getElementById("reserveNote").value = "";

        await syncFromSupabase();
        showNotice("予約を追加しました");
      });

      document.getElementById("addFuelBtn").addEventListener("click", async () => {
        showError("");
        const date = document.getElementById("fuelDate").value;
        const user_name = document.getElementById("fuelUser").value;
        const amount = Number(document.getElementById("fuelAmount").value);
        const odometer = document.getElementById("fuelOdometer").value;
        const note = document.getElementById("fuelNote").value.trim();

        if (!date || Number.isNaN(amount)) {
          showError("給油日と金額は必須です。");
          return;
        }

        const { error } = await supabase.from("fuel_logs").insert([{
          id: String(Date.now()),
          date,
          user_name,
          amount,
          odometer,
          note
        }]);

        if (error) {
          showError(error.message || "給油記録の追加に失敗しました");
          return;
        }

        document.getElementById("fuelDate").value = "";
        document.getElementById("fuelAmount").value = "";
        document.getElementById("fuelOdometer").value = "";
        document.getElementById("fuelNote").value = "";

        await syncFromSupabase();
        showNotice("給油記録を追加しました");
      });

      document.getElementById("addExpenseBtn").addEventListener("click", async () => {
        showError("");
        const date = document.getElementById("expenseDate").value;
        const user_name = document.getElementById("expenseUser").value;
        const category = document.getElementById("expenseCategory").value.trim();
        const amount = Number(document.getElementById("expenseAmount").value);
        const note = document.getElementById("expenseNote").value.trim();

        if (!date || !category || Number.isNaN(amount)) {
          showError("経費日・項目・金額は必須です。");
          return;
        }

        const { error } = await supabase.from("expense_logs").insert([{
          id: String(Date.now()),
          date,
          user_name,
          category,
          amount,
          note
        }]);

        if (error) {
          showError(error.message || "経費追加に失敗しました");
          return;
        }

        document.getElementById("expenseDate").value = "";
        document.getElementById("expenseCategory").value = "";
        document.getElementById("expenseAmount").value = "";
        document.getElementById("expenseNote").value = "";

        await syncFromSupabase();
        showNotice("経費を追加しました");
      });
    }

    window.deleteReservation = deleteReservation;
    window.deleteFuel = deleteFuel;
    window.deleteExpense = deleteExpense;
    window.saveOdometer = saveOdometer;

    setupTabs();
    setupEvents();
    syncFromSupabase();
  </script>
</body>
</html>
